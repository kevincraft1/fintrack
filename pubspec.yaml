name: fintrack_pro
description: "Modern Expense Tracker with 3-Second UX Concept."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8


  get: ^4.6.6

  # Database Lokal (Performa Tinggi & Async)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # UI Layout & Utilities
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.0
  intl: ^0.19.0
  fl_chart: 0.68.0
  path_provider: ^2.1.4
  pdf: ^3.11.3
  printing: ^5.12.0
  flutter_animate: ^4.5.2
  local_auth: ^2.3.0
  shared_preferences: ^2.2.3
  share_plus: ^10.0.0
  file_picker: ^8.0.5
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  
  # Code Generator untuk Isar DB
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
      - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/fintrack-pro.png"

flutter_native_splash:
  color: "#0F172A"
  image: "assets/images/fintrack-pro.png"
  android: true
  ios: false
  android_12:
    image: "assets/images/fintrack-pro.png"
    icon_background_color: "#0F172A"
    color: "#0F172A"