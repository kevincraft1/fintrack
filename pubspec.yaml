name: fintrack_pro
description: "Modern Expense Tracker with 3-Second UX Concept."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management, Dependency Injection & Routing
  get: ^4.6.6

  # Database Lokal (Performa Tinggi & Async)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # UI Layout & Utilities
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.0
  intl: ^0.19.0
  fl_chart: ^0.69.2
  path_provider: ^2.1.4
  pdf: ^3.11.3
  printing: ^5.12.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  
  # Code Generator untuk Isar DB
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true